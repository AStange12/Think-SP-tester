<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reddit-to-think</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
                <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
                <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
                <path d="M12 18v-5.5a.5.5 0 0 0-1 0V18"/>
            </svg>
            <span class="header-title">reddit-to-think</span>
            <span class="header-badge">v0.1</span>
        </div>
    </header>

    <main class="main">
        <span class="section-label">INPUT</span>

        <div class="card">
            <div class="field-group">
                <label class="field-label" for="url-input">Reddit URL</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input type="text" id="url-input" class="text-input" placeholder="https://reddit.com/r/changemyview/comments/...">
                </div>
            </div>

            <div class="field-group">
                <div class="field-label-row">
                    <label class="field-label" for="prompt-textarea">System Prompt</label>
                    <select id="mode-select" class="mode-select">
                        {% for key, prompt in prompts.items() %}
                        <option value="{{ key }}" {% if key == default_mode %}selected{% endif %}>
                            {{ prompt.label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <textarea id="prompt-textarea" class="textarea" placeholder="Enter system prompt instructions...">{{ prompts[default_mode].text }}</textarea>
                <span class="field-hint">Select a mode above or edit the prompt directly</span>
            </div>

            <div class="button-row">
                <button id="run-btn" class="btn-primary">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="6 3 20 12 6 21 6 3"/>
                    </svg>
                    Run
                </button>
            </div>
        </div>

        <span class="section-label">OUTPUT</span>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Output</span>
                <span id="status-badge" class="status-badge hidden"></span>
            </div>
            <hr class="divider">
            <div id="output-area" class="output-area">
                <div class="empty-state">
                    <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
                        <path d="M10 9H8"/>
                        <path d="M16 13H8"/>
                        <path d="M16 17H8"/>
                    </svg>
                    <span class="empty-text">System Prompt output will appear here</span>
                </div>
            </div>
            <div id="download-row" class="button-row hidden">
                <button id="download-btn" class="btn-secondary">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download .md
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>reddit-to-think parser · internal tool</span>
        <span>Reddit-to-Think-prj1</span>
    </footer>

    <!-- Prompt data for JS -->
    <script>
        window.PROMPTS = {{ prompts | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
